version: '3.8'

services:
  # Spring Boot application (cluvr-batch)
  spring:
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cluvr-batch
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:mysql://$DB_HOST:$DB_PORT/$DB_NAME?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_REDIS_HOST=${REDIS_HOST}
      - SPRING_REDIS_PORT=${REDIS_PORT}
    depends_on:
#      mysql:
#        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cluvr-net

#  # MySQL service
#  mysql:
#    restart: always
#    image: mysql:8.0
#    container_name: mysql-batch
#    healthcheck:
#      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
#      interval: 10s
#      retries: 5
#      start_period: 20s
#    environment:
#      MYSQL_DATABASE: ${DB_NAME}
#      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
#      MYSQL_ROOT_HOST: '%'
#      TZ: Asia/Seoul
#    volumes:
#      - mysql_data:/var/lib/mysql
#    ports:
#      - "3308:3306"
#    networks:
#      - cluvr-net

  # Redis service
  redis:
    restart: always
    image: redis:7.2
    container_name: redis-batch
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      retries: 5
    ports:
      - "6379:6379"
    networks:
      - cluvr-net

networks:
  cluvr-net:
    driver: bridge

volumes:
  mysql_data:
    driver: local